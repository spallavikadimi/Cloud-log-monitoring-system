<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <title>SplunkLite - Real-Time Log Monitoring</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: linear-gradient(to right, #e3f2fd, #fce4ec);
            transition: 0.3s;
        }

        body.dark {
            background: #121212;
            color: white;
        }

        header {
            display: flex;
            justify-content: space-between;
            padding: 20px 40px;
            align-items: center;
        }

        h1 {
            margin: 0;
            color: #007bff;
        }

        body.dark h1 {
            color: #90caf9;
        }

        .mode-btn {
            padding: 8px 15px;
            border: none;
            background: #333;
            color: white;
            border-radius: 20px;
            cursor: pointer;
        }

        form {
            text-align: center;
            margin-bottom: 20px;
        }

        input, select {
            padding: 10px;
            border-radius: 25px;
            border: none;
            margin: 5px;
            outline: none;
            width: 200px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        button.filter-btn {
            padding: 10px 20px;
            border-radius: 25px;
            border: none;
            background: #007bff;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button.filter-btn:hover {
            background: #0056b3;
        }

        table {
            width: 85%;
            margin: auto;
            border-collapse: separate;
            border-spacing: 0 10px;
        }

        th {
            background: #007bff;
            color: white;
            padding: 12px;
        }

        tbody tr {
            background: linear-gradient(135deg, #e3f2fd, #fce4ec);
            transition: 0.3s;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        tbody tr:hover {
            background: linear-gradient(135deg, #bbdefb, #f8bbd0);
            transform: scale(1.01);
        }

        td {
            padding: 12px;
            user-select: text; /* allows copy */
        }

        body.dark tbody tr {
            background: #1e1e1e;
        }

        #chart-container {
            width: 70%;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        body.dark #chart-container {
            background: #1e1e1e;
        }

        footer {
            text-align: center;
            padding: 15px;
            font-size: 14px;
            opacity: 0.7;
        }

        .no-data {
            text-align: center;
            font-size: 18px;
            color: gray;
            animation: fade 1s infinite alternate;
        }

        @keyframes fade {
            from { opacity: 0.5; }
            to { opacity: 1; }
        }

    </style>
</head>

<body>

<header>
    <div>
        <h1>SplunkLite</h1>
        <p>Real-Time Log Monitoring Made Simple</p>
    </div>
    <button class="mode-btn" onclick="toggleMode()">Mode</button>
</header>

<!-- FILTER -->
<form onsubmit="return false;">
    <input type="text" id="search" placeholder="Search logs...">
    <select id="severity">
        <option value="">All</option>
        <option value="INFO">INFO</option>
        <option value="WARNING">WARNING</option>
        <option value="ERROR">ERROR</option>
    </select>
    <button class="filter-btn" onclick="fetchLogs()">Filter</button>
</form>

<!-- TABLE -->
<table>
    <thead>
    <tr>
        <th>Time</th>
        <th>Source</th>
        <th>Message</th>
        <th>Severity</th>
    </tr>
    </thead>
    <tbody id="logTable"></tbody>
</table>

<!-- CHART -->
<div id="chart-container">
    <canvas id="chart"></canvas>
</div>

<footer>
    © 2026 Log Monitoring System
</footer>

<script>
    let chart;

    function fetchLogs() {
        let keyword = $("#search").val().toLowerCase();
        let severity = $("#severity").val();

        $.get("/logs", function(data) {

            let filtered = data.filter(log =>
                (!keyword || log.message.toLowerCase().includes(keyword)) &&
                (!severity || log.severity === severity)
            );

            let rows = "";

            if(filtered.length === 0){
                rows = `<tr><td colspan="4" class="no-data">No logs found 😔</td></tr>`;
            } else {
                filtered.forEach(log => {
                    rows += `
                        <tr>
                            <td>${log.timestamp}</td>
                            <td>${log.source}</td>
                            <td>${log.message}</td>
                            <td>${log.severity}</td>
                        </tr>`;
                });
            }

            $("#logTable").html(rows);

            let info = filtered.filter(l => l.severity === "INFO").length;
            let warn = filtered.filter(l => l.severity === "WARNING").length;
            let error = filtered.filter(l => l.severity === "ERROR").length;

            if(!chart){
                chart = new Chart(document.getElementById("chart"), {
                    type: "bar",
                    data: {
                        labels: ["INFO","WARNING","ERROR"],
                        datasets: [{
                            data: [info, warn, error],
                            backgroundColor: ["#4caf50","#ff9800","#f44336"]
                        }]
                    }
                });
            } else {
                chart.data.datasets[0].data = [info, warn, error];
                chart.update();
            }
        });
    }

    function toggleMode(){
        document.body.classList.toggle("dark");
    }

    setInterval(fetchLogs, 3000);
    fetchLogs();
</script>

</body>
</html>
